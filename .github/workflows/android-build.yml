name: Android Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "device.secret=${{ secrets.DEVICE_SECRET }}" >> local.properties
          echo "api.key=${{ secrets.API_KEY }}" >> local.properties
          echo "KEYSTORE_PATH=keys/release.keystore" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Decode keystore
        run: |
          mkdir -p keys
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keys/release.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apex-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: apex-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
